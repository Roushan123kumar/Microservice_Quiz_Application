version: '3.8'

services:
  service-registry:
    build: ./service-registry
    container_name: service-registry
    ports:
      - "8761:8761"
    networks:
      - quiz-network

  question-db:
    image: postgres:15-alpine
    container_name: question-db
    environment:
      POSTGRES_DB: questiondb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "0000"
    ports:
      - "5432:5432"
    networks:
      - quiz-network

  quiz-db:
    image: postgres:15-alpine
    container_name: quiz-db
    environment:
      POSTGRES_DB: quizdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "0000"
    ports:
      - "5433:5432"
    networks:
      - quiz-network

  question-service:
    build: ./question-service
    container_name: question-service
    ports:
      - "8080:8080"
    environment:
      DB_HOST: question-db
      DB_USERNAME: postgres
      DB_PASSWORD: "0000"
      EUREKA_HOST: service-registry
    depends_on:
      - service-registry
      - question-db
    networks:
      - quiz-network

  quiz-service:
    build: ./quiz-service
    container_name: quiz-service
    ports:
      - "8090:8090"
    environment:
      DB_HOST: quiz-db
      DB_USERNAME: postgres
      DB_PASSWORD: "0000"
      EUREKA_HOST: service-registry
    depends_on:
      - service-registry
      - quiz-db
      - question-service
    networks:
      - quiz-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8765:8765"
    environment:
      EUREKA_HOST: service-registry
    depends_on:
      - service-registry
    networks:
      - quiz-network

networks:
  quiz-network:
    driver: bridge
